# ==============================================================================
# tmux設定ファイル
# ==============================================================================

# ===== 基本設定 =====
# デフォルトのターミナルタイプを設定（ghostty用）
set-option -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# エスケープキーの遅延を解消
set-option -sg escape-time 0

# ヒストリーのサイズを増やす
set-option -g history-limit 10000

# デフォルトシェルを設定
set-option -g default-shell /bin/zsh

# ===== キーバインド設定 =====
# プレフィックスキーをCtrl-aに変更（Ctrl-bより押しやすい）
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# 設定ファイルの再読み込み
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded!"

# ペインの分割
bind-key s split-window -v -c "#{pane_current_path}"  # 横分割（縦に分かれる）
bind-key v split-window -h -c "#{pane_current_path}"  # 縦分割（横に分かれる）

# ペインの移動（Vimライク）
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ペインのリサイズ
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# ウィンドウの移動
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# ===== マウス設定 =====
# マウス操作を有効にする
set-option -g mouse on

# ===== コピーモード設定 =====
# Vimライクなコピーモード
setw -g mode-keys vi
bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key p paste-buffer

# ===== ウィンドウ・ペイン設定 =====
# ウィンドウとペインの番号を1から開始
set-option -g base-index 1
setw -g pane-base-index 1

# ウィンドウ番号を自動で振り直す
set-option -g renumber-windows on

# アクティブなペインを強調表示
set-option -g pane-active-border-style fg=colour166,bg=default

# 非アクティブなペインのボーダー
set-option -g pane-border-style fg=colour235,bg=default

# ===== ステータスバー設定 =====
# ステータスバーを有効にする
set-option -g status on

# ステータスバーを上部に表示
set-option -g status-position top

# ステータスバーの更新間隔（秒）
set-option -g status-interval 1

# ステータスバーの色
set-option -g status-style bg=colour234,fg=colour255

# ステータスバーの左側
set-option -g status-left-length 30
set-option -g status-left '#[fg=colour255,bg=colour27] #S #[default]'

# ステータスバーの右側
set-option -g status-right-length 60
set-option -g status-right '#[fg=colour255,bg=colour27] %Y-%m-%d %H:%M #[default]'

# ウィンドウリストの色
setw -g window-status-current-style fg=colour255,bg=colour27,bold
setw -g window-status-style fg=colour244,bg=default

# ===== その他の便利な設定 =====
# ウィンドウ名を自動設定しない
setw -g automatic-rename off

# ウィンドウタイトルを端末のタイトルに反映
set-option -g set-titles on
set-option -g set-titles-string '#T'

# ベルを無効にする
set-option -g bell-action none

# Ctrl-aを二回押すことで、直前のウィンドウに移動
bind-key C-a last-window

# 新しいウィンドウを現在のディレクトリで開く
bind-key c new-window -c "#{pane_current_path}"