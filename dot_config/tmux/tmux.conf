set -as terminal-features ",alacritty:RGB,xterm-ghostty:RGB,foot:RGB,wezterm:RGB"
set -g mouse off
set -g history-limit 999999999

# vimのescの反応を早くする
set -sg escape-time 1

# 設定ファイルのリロード
bind r source-file ~/.tmux.conf \; display-message "Reload Config!!"

# windowのインデックスを1から始める
set -g base-index 1

# Prefixキーの変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Window分割
bind \\ split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペインを最大化する
bind -n C-z resize-pane -Z

# コピーモード
set -g set-clipboard on
set -gw mode-keys vi
bind -T copy-mode-vi v send -X begin-selection # 'v' で選択を始める
bind -T copy-mode-vi V send -X select-line # 'V' で行選択
bind -T copy-mode-vi C-v send -X rectangle-toggle # 'C-v' で矩形選択
bind -T copy-mode-vi y send -X copy-pipe-and-cancel # 'y' でヤンクしてクリップボードに
bind -T copy-mode-vi Y send -X copy-line-pipe-and-cancel # 'Y' で行ヤンクしてクリップボードに
bind-key C-p paste-buffer # 'C-p'でペースト
