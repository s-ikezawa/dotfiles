#===============================================================================
# General
#===============================================================================
# Prefix キーを <C-b> から <C-a> に変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ウィンドウ、ペインのインデックス
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True Color (24-bit) 対応
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# スクロールバックのヒストリ
set -g history-limit 100000

# フォーカス追従 (Neovim の autoread などが効くように)
set -g focus-events on

# 設定のリロード
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

#===============================================================================
# Status bar (Catppuccin Mocha)
#===============================================================================
# パレット
#   base #1e1e2e / mantle #181825 / surface0 #313244 / surface1 #45475a
#   text #cdd6f4 / subtext #a6adc8 / blue #89b4fa / mauve #cba6f7
#   green #a6e3a1 / peach #fab387

# ステータスバーを上に表示
set -g status-position top

# 全体
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-justify left

# 左側: セッション名
set -g status-left-length 40
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cba6f7]  "

# 右側: なし
set -g status-right ""

# ウィンドウ (非アクティブ)
setw -g window-status-style "bg=#1e1e2e,fg=#a6adc8"
setw -g window-status-format " #I:#W#F "

# ウィンドウ (アクティブ)
setw -g window-status-current-style "bg=#313244,fg=#89b4fa,bold"
setw -g window-status-current-format " #I:#W#F "

# ペインボーダー
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7"

# メッセージ
set -g message-style "bg=#313244,fg=#cdd6f4"

#===============================================================================
# Pane
#===============================================================================
# ペインの分割 (カレントディレクトリを引き継ぐ)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新規ウィンドウもカレントディレクトリで開く
bind c new-window -c "#{pane_current_path}"

# ペインの移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインのリサイズ
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1

# ウィンドウの移動
bind -r C-p previous-window
bind -r C-n next-window

#===============================================================================
# Copy mode
#===============================================================================
# コピーモードで vi 風のキーバインドを使う
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Escape send-keys -X cancel

#===============================================================================
# Plugin
#===============================================================================
# プラグインパスを決定（シェルで展開させる）
run-shell 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/"'

# tpm が無ければ clone
if-shell '[ ! -d "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/tpm" ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/tpm && ${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/tpm/bin/install_plugins"'

set -g @plugin 'tmux-plugins/tpm'              # Plugin Manager
set -g @plugin 'tmux-plugins/tmux-sensible'    # 設定集
set -g @plugin 'christoomey/vim-tmux-navigator' # C-h/j/k/l で Neovim split と tmux pane をシームレスに移動

# 初期化
run-shell '"${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/tpm/tpm"'
