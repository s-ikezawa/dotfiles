# =========================================
# 基本設定
# =========================================

# プレフィックスキーを C-b から C-a に変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 設定ファイルをリロード (prefix + r)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# 256色 + True Color (24bit) 対応
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# エスケープキーの遅延をなくす (Vim 用)
set -sg escape-time 0

# 履歴を多めに保持
set -g history-limit 10000

# ウィンドウ・ペインのインデックスを 1 から始める
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じたら番号を詰め直す
set -g renumber-windows on

# フォーカスイベントを有効化 (Vim の autoread 連動など)
set -g focus-events on

# マウス操作を有効化
set -g mouse on

# アクティビティ通知
setw -g monitor-activity on
set  -g visual-activity off

# Kitty graphics protocol を tmux 越しで通す (Ghostty + snacks.image 連携用)
# Neovim 内の Markdown 画像 / Mermaid をインライン描画するために必要
set -g allow-passthrough on

# =========================================
# ペイン分割: | で縦分割, - で横分割
# 分割時はカレントパスを引き継ぐ
# =========================================
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 新規ウィンドウもカレントパスで開く
bind c new-window -c "#{pane_current_path}"

# =========================================
# ペイン移動: Vim 風に h, j, k, l
# =========================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =========================================
# ペインリサイズ: H, J, K, L (繰り返し可能)
# =========================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =========================================
# コピーモード: Vim 風キーバインド
# =========================================
setw -g mode-keys vi

# prefix + v / [ でコピーモード開始
bind v copy-mode
bind [ copy-mode

# v で選択開始, V で行選択, C-v で矩形選択
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# y でコピー (macOS の pbcopy にも転送)
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# Enter でもコピー
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# マウスドラッグ後の選択もクリップボードへ
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# prefix + p でペースト
bind p paste-buffer

# =========================================
# ステータスバー (Catppuccin Mocha)
# Palette:
#   base     #1e1e2e  mantle   #181825  crust    #11111b
#   surface0 #313244  surface1 #45475a  surface2 #585b70
#   overlay0 #6c7086  overlay1 #7f849c  overlay2 #9399b2
#   text     #cdd6f4  subtext1 #bac2de  subtext0 #a6adc8
#   blue     #89b4fa  mauve    #cba6f7  green    #a6e3a1
#   peach    #fab387  yellow   #f9e2af  red      #f38ba8
#   teal     #94e2d5  sapphire #74c7ec  lavender #b4befe
# =========================================
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80

# 左: セッション名 (mauve のバッジ風)
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=#1e1e2e,nobold] "

# 右: ホスト名・日付・時刻 (surface0 の上に並べる)
set -g status-right "#[fg=#45475a,bg=#1e1e2e]#[fg=#cdd6f4,bg=#45475a] #h #[fg=#89b4fa,bg=#45475a] %Y-%m-%d (%a) #[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M "

# ウィンドウタブ
setw -g window-status-style              "fg=#a6adc8,bg=#1e1e2e"
setw -g window-status-format             " #I:#W "
setw -g window-status-current-style      "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-current-format     " #I:#W "
setw -g window-status-activity-style     "fg=#f9e2af,bg=#1e1e2e,bold"
setw -g window-status-bell-style         "fg=#f38ba8,bg=#1e1e2e,bold"
setw -g window-status-separator          ""

# メッセージ・コマンドライン
set -g message-style         "fg=#1e1e2e,bg=#f9e2af,bold"
set -g message-command-style "fg=#1e1e2e,bg=#fab387,bold"

# ペインの境界線
set -g pane-border-style        "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# コピーモード選択範囲
setw -g mode-style "fg=#1e1e2e,bg=#f5c2e7,bold"

# クロックモード (prefix + t)
setw -g clock-mode-colour "#89b4fa"
