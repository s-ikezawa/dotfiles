#================================================================================
# 基本設定
#================================================================================
# Prefixキーの変更
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# 設定ファイルのリロード
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Reload Config!!"

# マウス操作を無効
set-option -g mouse off

# Escキーの遅延を解消(vimユーザーは絶対に設定する)
set-option -s escape-time 0

# ヒストリの行数を増やす(Claude Code常用・出力が多いため大きめに確保)
#   パネルごとにRAMへ保持されるが、メモリよりも遡れる量を優先
set-option -g history-limit 100000

# 端末のタイトルを自動設定
set-option -g set-titles on
set-option -g set-titles-string "#T"

# アクティビティの監視(他ウィンドウの変化を通知)
set-window-option -g monitor-activity on
set-option -g visual-activity off

# 256色端末に対応
set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# フォーカスイベントを有効化(vim等の自動リロード連携)
set-option -g focus-events on

# 拡張キーは tmux では扱わない。Shift+Enter は Ghostty 側の keybind
# (~/.config/ghostty/config: shift+enter=text:\x1b[13;2u) で直接送る。
#   理由: extended-keys always は snacks.image の端末応答(TermResponse)を壊して
#         バッファにシーケンスを漏らし、ファイルを破壊するため。off にして回避する。
#   extkeys feature も外し、Ghostty の生シーケンスを tmux に解釈させず素通しさせる。
set-option -g extended-keys off
# set-option -as terminal-features 'xterm*:extkeys'

# Shift+Enter を tmux 側でも明示的に握って、内側(Claude Code 等)へ CSI-u を再送する。
#   extended-keys off だと tmux は受け取った Shift+Enter を素の Enter(\r) に
#   ダウングロードして送ってしまい、Claude Code で改行にならず送信されてしまう。
#   そこで root テーブルで S-Enter を捕まえ、Esc + "[13;2u" = \x1b[13;2u を組み立てて
#   そのまま渡す。Ghostty の keybind と同じシーケンスなので tmux 内外で挙動が揃う。
bind -n S-Enter send-keys Escape "[13;2u"

# パススルーを許可(tmux外側へ通知・プログレスバー等のエスケープシーケンスを通す)
set-option -g allow-passthrough on

#================================================================================
# ウィンドウ設定
#================================================================================
# ウィンドウの番号を1からスタート
set-option -g base-index 1

# 新規ウィンドウもカレントパスを引き継ぐ
bind c new-window -c "#{pane_current_path}"

# ウィンドウの移動(prefixなし・Alt+n/p)
bind -n M-n next-window
bind -n M-p previous-window

# ウィンドウやペインを閉じたら番号を詰める
set-option -g renumber-windows on

#================================================================================
# ペイン設定
#================================================================================
set-option -g pane-base-index 1

# ペイン分割時に現在のパスを引き継ぐ
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ペイン間の移動(vi風 hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペイン/ウィンドウのシームレス移動(prefixなし・Alt+hjkl)
#   フォーカス中のペインが (n)vim なら M-hjkl を内側へ素通しし、smart-splits.nvim に
#   処理させる(nvim ウィンドウ間を移動し、端まで来たら自動で隣の tmux ペインへ越境)。
#   それ以外のペインでは従来どおり tmux のペイン移動。nvim 側設定は ~/.config/nvim/lua/plugins/smart-splits.lua。
#   is_vim: pane の前景プロセスが (n)vim/view/fzf 等かを ps で判定(macOS の ps でも動作確認済み)。
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
# コピーモード中は内側へ送らず、tmux のペイン移動として扱う
bind -T copy-mode-vi M-h select-pane -L
bind -T copy-mode-vi M-j select-pane -D
bind -T copy-mode-vi M-k select-pane -U
bind -T copy-mode-vi M-l select-pane -R

# ペインのリサイズ(vi風 HJKL・繰り返し可能)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペイン/ウィンドウのリサイズ(prefixなし・Alt+Shift+HJKL)
#   (n)vim のペインなら内側へ送って smart-splits.nvim に nvim ウィンドウをリサイズさせ、
#   それ以外は tmux ペインをリサイズ。is_vim は上の移動セクションで定義済み。
bind -n M-H if-shell "$is_vim" 'send-keys M-H' 'resize-pane -L 5'
bind -n M-J if-shell "$is_vim" 'send-keys M-J' 'resize-pane -D 5'
bind -n M-K if-shell "$is_vim" 'send-keys M-K' 'resize-pane -U 5'
bind -n M-L if-shell "$is_vim" 'send-keys M-L' 'resize-pane -R 5'

#================================================================================
# ファイルピッカー(fzf + popup)
#================================================================================
# C-f でカレントパスを起点に fzf ファイル選択ポップアップを開く。
#   選択したファイルを元ペインへ送信(Claude Code等が動いていれば @ 付きで挿入)。
#   -d で popup の作業ディレクトリを元ペインに合わせ、相対パスを一致させる。
bind -n C-f display-popup -E -d "#{pane_current_path}" -w 90% -h 90% \
  "$HOME/.config/tmux/scripts/tmux-file-picker.sh"

# prefix + f : zoxide 履歴から起点ディレクトリを選んで別ディレクトリのファイルを探す
#   (zoxide が学習済みのディレクトリが対象。出力は絶対パス)
bind f display-popup -E -d "#{pane_current_path}" -w 90% -h 90% \
  "$HOME/.config/tmux/scripts/tmux-file-picker.sh --zoxide"

#================================================================================
# コピーモード(vi風キーバインド)
#================================================================================
# vi風の操作を有効化
set-window-option -g mode-keys vi

# v で選択開始、y でコピー(クリップボード連携)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Prefix + [ でコピーモード開始、Prefix + ] でペースト
bind-key [ copy-mode
bind-key ] paste-buffer

#================================================================================
# ステータスバー
#================================================================================
# ステータスバーの更新間隔(秒)
set-option -g status-interval 5

# ステータスバーを上に配置
set-option -g status-position top

#================================================================================
# カラーテーマ(Catppuccin Mocha)
#================================================================================
# パレット
#   base #1e1e2e / mantle #181825 / crust #11111b
#   text #cdd6f4 / subtext0 #a6adc8 / surface0 #313244 / surface1 #45475a
#   blue #89b4fa / lavender #b4befe / mauve #cba6f7 / green #a6e3a1
#   peach #fab387 / red #f38ba8 / yellow #f9e2af / teal #94e2d5

# ステータスバー全体(端末背景 base より一段暗い mantle で境界を出す)
set-option -g status-style "bg=#181825,fg=#cdd6f4"
set-option -g status-justify left
set-option -g status-left-length 100
set-option -g status-right-length 100

# 左側:セッション名
set-option -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#181825,fg=#181825] "

# 右側:ホスト名と時刻
set-option -g status-right "#[fg=#45475a]#[bg=#45475a,fg=#cdd6f4] #H #[fg=#cba6f7]#[bg=#cba6f7,fg=#1e1e2e,bold] %Y-%m-%d %H:%M "

# ウィンドウ(非アクティブ)
set-window-option -g window-status-format "#[bg=#181825,fg=#a6adc8] #I #W "
# ウィンドウ(アクティブ)
set-window-option -g window-status-current-format "#[bg=#313244,fg=#fab387,bold] #I #W #{?window_zoomed_flag,#[fg=#f38ba8] ,}"
# アクティビティのあるウィンドウ
set-window-option -g window-status-activity-style "fg=#f9e2af"
set-window-option -g window-status-separator ""

# ペインの境界線
set-option -g pane-border-style "fg=#45475a"
set-option -g pane-active-border-style "fg=#89b4fa"

# メッセージ・コマンドラインの色
set-option -g message-style "bg=#313244,fg=#cdd6f4"
set-option -g message-command-style "bg=#313244,fg=#cdd6f4"

# コピーモード等の選択色
set-window-option -g mode-style "bg=#585b70,fg=#cdd6f4"

# クロックモード(Prefix + t)の色
set-window-option -g clock-mode-colour "#89b4fa"

# 背景(端末未使用領域)
set-option -g display-panes-active-colour "#89b4fa"
set-option -g display-panes-colour "#45475a"

