set -as terminal-features ",alacritty:RGB,xterm-ghostty:RGB,foot:RGB,wezterm:RGB"
set -g mouse off
set -g history-limit 999999999

# vimのescの反応を早くする
set -sg escape-time 1

# 設定ファイルのリロード
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reload Config!!"

# windowのインデックスを1から始める
set -g base-index 1

# windowが減ったら自動でインデックス番号を詰める
set-option -g renumber-windows on

# Prefixキーの変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Window分割
bind \\ split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1

# ペインを最大化する
bind -n C-z resize-pane -Z

#==============================================================================================================
# コピーモード
#==============================================================================================================
set -g set-clipboard on
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection # 'v' で選択を始める
bind -T copy-mode-vi V send -X select-line # 'V' で行選択
bind -T copy-mode-vi C-v send -X rectangle-toggle # 'C-v' で矩形選択
bind -T copy-mode-vi y send -X copy-pipe-and-cancel # 'y' でヤンクしてクリップボードに
bind -T copy-mode-vi Y send -X copy-line-pipe-and-cancel # 'Y' で行ヤンクしてクリップボードに
bind-key -T copy-mode-vi Escape send -X cancel
bind-key C-p paste-buffer # 'C-p'でペースト

# コピーモードでのページ移動
bind-key -T copy-mode-vi 'C-u' send -X halfpage-up
bind-key -T copy-mode-vi 'C-d' send -X halfpage-down
bind-key -T copy-mode-vi 'C-b' send -X page-up
bind-key -T copy-mode-vi 'C-f' send -X page-down

# 単語単位での移動
bind-key -T copy-mode-vi 'w' send -X next-word
bind-key -T copy-mode-vi 'b' send -X previous-word
bind-key -T copy-mode-vi 'e' send -X next-word-end

# 行の先頭・末尾への移動
bind-key -T copy-mode-vi '0' send -X start-of-line
bind-key -T copy-mode-vi '$' send -X end-of-line
bind-key -T copy-mode-vi '^' send -X back-to-indentation

# 検索
bind-key -T copy-mode-vi '/' send -X search-forward
bind-key -T copy-mode-vi '?' send -X search-backward
bind-key -T copy-mode-vi 'n' send -X search-again
bind-key -T copy-mode-vi 'N' send -X search-reverse

