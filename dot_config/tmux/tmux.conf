# ===== General =====
# ESC キーの遅延をなくす(vim などでの体感が大きく改善する)
set -sg escape-time 0
# スクロールバック行数を増やす(デフォルト 2000 行)
set -g history-limit 50000
# window/pane 番号を 1 始まりにする(キーボードで押しやすい)
set -g base-index 1
setw -g pane-base-index 1
# window を閉じた時に番号を詰める
set -g renumber-windows on
# フォーカスイベントを通知(vim の autoread などで利用)
set -g focus-events on

# ===== Terminal / colors =====
# 256 色・TrueColor を正しく扱う
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ===== Extended keys =====
# Shift+Enter などの修飾キー付きキーを端末に伝えるため拡張キーを有効化する
# (Claude Code の Shift+Enter で改行するために必要)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ===== Prefix key =====
# デフォルトの C-b を解除し、prefix キーを C-Space に変更する
# C-Space は他のキーバインドと競合しにくく、両手の親指で押しやすい
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ===== Reload config =====
# prefix + r で tmux.conf を再読み込みし、完了メッセージをステータスラインに表示する
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded!"

# ===== Status bar =====
# ステータスバーを画面上部に表示する
set -g status-position top

# 全体の下地(Catppuccin Mocha 系)
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

# 左: session 名を青背景で強調
set -g status-left  '#[bg=#89b4fa,fg=#1e1e2e,bold] session: #S #[bg=#1e1e2e] '
set -g status-left-length 30

# 右: 非表示
set -g status-right ''

# window 名の代わりに pane の現在ディレクトリ(basename)を表示する
# 実行中コマンド名(claude のバージョン等)に依存せず、作業場所が一目で分かる
# アクティブ window は黄色背景で反転表示してメリハリを付ける
set -g window-status-format         ' #I:#{b:pane_current_path} '
set -g window-status-current-format '#[bg=#f9e2af,fg=#1e1e2e,bold] #I:#{b:pane_current_path} '

# ===== Copy mode =====
# copy-mode のキー操作を vi 風にする(h/j/k/l で移動など)
setw -g mode-keys vi
# vim 風に v で選択開始、V で行選択、y でコピーしてモード終了
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# prefix + / で copy-mode に入り、そのまま上方向検索を開始する
bind / copy-mode \; send-keys ?

# ===== Pane split =====
# \ で左右分割、- で上下分割(どちらも Shift 不要)
# 分割後は現在のディレクトリを引き継ぐ
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ===== Pane navigation =====
# vim 風に h/j/k/l で pane を移動する
# -r で prefix を押し直さずに連続移動できる(repeat-time 内)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ===== Pane resize =====
# vim 風に H/J/K/L (Shift + hjkl) で pane をリサイズする
# 1 回あたり 5 セル動かし、-r で連続操作に対応する
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
