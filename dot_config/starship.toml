"$schema" = 'https://starship.rs/config-schema.json'

# format は定義しない = starship の既定フォーマットをそのまま使う。
# 既定には言語バージョン(node/python/...)や実行時間なども含まれるため、
# ここでは「消したいもの」と「見た目を整えたいもの」だけをモジュール単位で上書きする。

# =============================================================
# 右プロンプト
# =============================================================
# 左側は「パス + git」に保ち、付随情報は右端へ逃がす。
# right_format に書いたモジュールは既定フォーマット($all)から自動的に
# 除外されるため、左右への二重表示にはならない。
# zsh の RPROMPT は入力が伸びると消えるのでコピペの邪魔にもならない。
right_format = "$cmd_duration$time"

# =============================================================
# ユーザー名 / ホスト名(表示しない)
# =============================================================
# 既定では「SSH 接続中」「root」「$USER と既定ユーザーが異なる」場合のみ
# 表示されるが、ローカル専用のマシンでは不要なので明示的に無効化する。
[username]
disabled = true

[hostname]
disabled = true

# =============================================================
# カレントディレクトリ
# =============================================================
[directory]
truncation_length = 3       # 表示するディレクトリ階層は末尾 3 つまで
truncate_to_repo = true     # git リポジトリ内ではリポジトリルート起点の相対パスにする
truncation_symbol = "…/"    # 省略された箇所を明示する
style = "bold cyan"
# directory には symbol 設定が無いため format の先頭にアイコンを直接置く。
# アイコンは nf-fa-folder (U+F07B)。$read_only は読み取り専用ディレクトリの錠前。
format = "[ $path]($style)[$read_only]($read_only_style) "

# =============================================================
# Git ブランチ
# =============================================================
[git_branch]
symbol = " "               # nf-dev-git_branch (U+E725)
format = "[$symbol$branch]($style) "
style = "bold purple"

# =============================================================
# Git の作業ツリー状態
# =============================================================
# 例: [!?⇡1] = 変更あり(!) / 未追跡ファイルあり(?) / push 待ち 1 コミット(⇡1)
# 外側の \[ \] はリテラルの角括弧(装飾なしの [ ] は starship のスタイル記法)。
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"

# rebase / merge / cherry-pick などの進行中状態(ブランチ名だけでは気付けないため)
[git_state]
style = "bold red"

# =============================================================
# AWS プロファイル
# =============================================================
# プロジェクト配下の mise.toml / mise.local.toml の [env] で AWS_PROFILE を
# 設定する運用を前提とする。cd で自動的に入り、外に出れば消えるので、
# 「どのアカウントに向いているか」が常に見える。
#
# 標準の [aws] モジュールは使えない。~/.aws/credentials が無く config が
# login_session 方式のため starship が「認証情報なし」と判断して抑制し、
# 回避策の force_display = true では未設定時にも [default] のリージョンを
# 常時表示してしまう。env_var なら「設定時だけ出す」を素直に表現できる。
[env_var.AWS_PROFILE]
variable = "AWS_PROFILE"
symbol = " "               # nf-dev-aws (U+E7AD)
format = "on [$symbol$env_value]($style) "
style = "bold yellow"

# 終了ステータス([status])は使わない。
# -------------------------------------------------------------
# 失敗したコマンドは自身がエラーメッセージを出すので、終了コードを
# プロンプトに常設する価値は低い割に、毎行の横幅を消費して邪魔になる。
# 失敗の事実は character の色だけで足りる(横幅を消費しない)。

# =============================================================
# コマンド実行時間 / 時刻(いずれも右プロンプト側)
# =============================================================
# cmd_duration は既定で有効。2 秒を超えたコマンドだけ所要時間を出す。
[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "dimmed yellow"

# time は既定 disabled。コマンドを実行した時刻を残しておくと、
# スクロールバックを遡ったときに「いつの作業か」が追える。
[time]
disabled = false
format = "[$time]($style)"
time_format = "%H:%M"
style = "dimmed white"

# =============================================================
# プロンプト記号
# =============================================================
# 直前のコマンドが失敗したら赤くなるので、終了ステータスを目で追える。
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
