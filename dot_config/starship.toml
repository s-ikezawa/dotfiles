# =============================================================
# starship プロンプト設定
# =============================================================
# nvim / tmux と合わせて Catppuccin Mocha パレットで配色を統一する。
# シンボル(アイコン)は starship 既定の Nerd Font グリフをそのまま使い、
# 主要モジュールの色だけパレット名で上書きしている。
"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bold mauve"

[git_status]
style = "bold red"

[git_state]
style = "bold mauve"

[cmd_duration]
min_time = 500          # 500ms 以上かかったコマンドだけ実行時間を表示
style = "bold yellow"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# --- Catppuccin Mocha パレット ---
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
