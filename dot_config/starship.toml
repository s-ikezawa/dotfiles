# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = """
$hostname\
$directory\
$git_branch\
$git_status\
$golang\
$java\
$kotlin\
$scala\
$php\
$nodejs\
$gradle\
$terraform\
$line_break\
$character
"""

# starship „ĀĆÁŹĺŚú®„Āģ„Éá„ā£„É¨„āĮ„Éą„É™„Āģ„Éē„ā°„ā§„Éę„āí„ÉĀ„āß„ÉÉ„āĮ„Āô„āč„Āģ„āí10„Éü„É™ÁßíŚĺÖ„Ā°„Āĺ„Āô
scan_timeout = 10

[hostname]
ssh_only = false
disabled = false
format = '$ssh_symbols$hostname '

[directory]
truncation_length = 99 
truncate_to_repo = false

