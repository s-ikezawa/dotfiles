[general]
import = [ "~/.config/alacritty/theme/catppuccin-mocha.toml" ]

[window]
padding = { x = 5, y = 5 }
decorations = "Buttonless"

[env]
TERM = "xterm-256color"

[font]
size = 16
normal = { family = "PlemolJP Console NF", style = "Regular" } # Regular or Medium
bold = { family = "PlemolJP Console NF", style = "Bold" }
italic = { family = "PlemolJP Console NF", style = "Italic" }
bold_italic = { family = "PlemolJP Console NF", style = "Bold Italic" }
