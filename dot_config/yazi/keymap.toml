# =============================================================
#  yazi キーマップ
# =============================================================
#  prepend_keymap は既定のキーマップより優先される。
#  ここに書いたもの以外は yazi の既定がそのまま使える。

# 選択中(無ければホバー中)のファイルを、AI が動いている herdr のペインへ
# @ 付きで送り込む。Enter は yazi 本来の「開く」のまま残したいので、
# --chooser-file ではなくこちらで発火させている。
#
# %h = ホバー中のパス / %s = 選択中の全パス。
# 選択が無いと %s は空になるため、両方渡して受け側で判断している。
#
# --block を付けていないのでバックグラウンド実行となり、yazi は閉じない。
# 続けて別のファイルを選んで何度でも送れる。
#
# "@" は yazi の既定キーマップで未使用。
[[mgr.prepend_keymap]]
on = "@"
run = 'shell -- "$HOME/.config/herdr/yazi-send.sh" %h %s'
desc = "選択中のファイルを AI ペインへ @ 付きで送る"
