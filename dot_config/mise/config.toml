# Pythonзі»
python = "latest"
uv = "latest"

# gitзі»
"github:cli/cli" = "latest"
"aqua:x-motemen/ghq" = "latest"

# shellж‹Ўејµ
"github:rossmacarthur/sheldon" = "latest"
"aqua:starship/starship" = "latest"

# Terminalж‹Ўејµ
