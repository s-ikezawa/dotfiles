[settings.pipx]
# pipx гѓђгѓѓг‚Їг‚Ёгѓігѓ‰гЃ®гѓ„гѓјгѓ«г‚’ pipx гЃ§гЃЇгЃЄгЃЏ uv(uvx) гЃ§е°Ће…Ґгѓ»е®џиЎЊгЃ™г‚‹
uvx = true

[tasks.up]
description = "Homebrewгѓ»miseгѓ»zsh гѓ—гѓ©г‚°г‚¤гѓі(sheldon)г‚’гЃѕгЃЁг‚ЃгЃ¦ж›ґж–°"
env = { MISE_GITHUB_TOKEN = "{{ exec(command='gh auth token 2>/dev/null || true') | trim }}" }
run = [
  "brew update",
  "brew upgrade --greedy --yes", # formula гЃЁ cask гЃ®дёЎж–№г‚’ж›ґж–°(--greedy гЃ§и‡Єе‹•ж›ґж–°жЊЃгЃЎгЃ® cask г‚‚еЇѕи±Ў)
  "brew cleanup",
  "mise self-update --yes",
  "mise upgrade",
  "mise prune --yes",
  "sheldon lock --update", # zsh гѓ—гѓ©г‚°г‚¤гѓі(plugins.toml)г‚‚жњЂж–°еЊ–
]
