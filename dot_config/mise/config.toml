[tools]
"aqua:ajeetdsouza/zoxide" = "latest"
"aqua:BurntSushi/ripgrep" = "latest"
"aqua:gh" = "latest"
"aqua:junegunn/fzf" = "latest"
"aqua:neovim/neovim" = "latest"
"aqua:rossmacarthur/sheldon" = "latest"
"aqua:sharkdp/bat" = "latest"
"aqua:sharkdp/fd" = "latest"
"aqua:tmux/tmux-builds" = "latest"
"aqua:tree-sitter/tree-sitter" = "latest"
node = "latest"
"aqua:LuaLS/lua-language-server" = "latest"
java = "temurin-25"
kotlin = { version = "2.4", asset_pattern = "kotlin-compiler-*.zip", bin_path = "kotlinc/bin" }
"aqua:x-motemen/ghq" = "latest"
python = "latest"
uv = "latest"
"pipx:trafilatura" = "latest"
"aqua:terraform" = "latest"
"aqua:docker/cli" = "latest"
"aqua:docker/compose" = { version = "latest", postinstall = 'mkdir -p "${XDG_CONFIG_HOME:-$HOME/.config}/docker/cli-plugins" && ln -sf "$MISE_TOOL_INSTALL_PATH/docker-cli-plugin-docker-compose" "${XDG_CONFIG_HOME:-$HOME/.config}/docker/cli-plugins/docker-compose"' }
"aqua:abiosoft/colima" = "latest"
go = "latest"
"aqua:lima-vm/lima" = "latest"
"aqua:aws/aws-cli" = "latest"
"aqua:FiloSottile/mkcert" = "latest"
"npm:@playwright/cli" = "latest"
"go:golang.org/x/tools/gopls" = "latest"

[env]
# docker CLI 設定を XDG 準拠（~/.config/docker）にする。compose プラグインも配下に置く。
DOCKER_CONFIG = "{{ env.XDG_CONFIG_HOME }}/docker"
# colima のソケットを直接指定（DOCKER_CONFIG 移設で docker context が見えない問題を回避）。
DOCKER_HOST = "unix://{{ env.XDG_CONFIG_HOME }}/colima/default/docker.sock"

[tasks.up]
description = "Homebrew と mise をまとめて更新"
run = [
  "brew update",
  "brew upgrade --cask --greedy",
  "brew cleanup",
  "mise self-update --yes",
  "mise upgrade",
  "mise prune --yes",
]

[settings]

[settings.pipx]
uvx = true
