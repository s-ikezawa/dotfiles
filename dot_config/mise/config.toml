[tools]
# Go
go = "latest"

# JavaScript & TypeScript
node = "latest"
pnpm = "latest"

# Python
python = "latest"
uv = "latest"

# Git & GitHub
gh = "latest"
ghq = "latest"

# Docker
docker-cli = "latest"
# aqua の compose バイナリは `docker-cli-plugin-docker-compose` という名前で入り、PATH 上に `docker-compose` が現れないため `docker compose`(スペース) が動かない。
# インストール毎に Docker CLI プラグインディレクトリへ symlink を張り直して `docker compose` を有効化する。
# 注意: mise の shim を指すと docker のプラグイン呼び出しで argv が崩れ `docker compose up` が壊れる。必ず実バイナリ($MISE_TOOL_INSTALL_PATH 配下)を指すこと。
# プラグイン先は DOCKER_CONFIG(XDG: ~/.config/docker)準拠。postinstall に DOCKER_CONFIG が伝播しない場合でも fallback で同じ XDG パスを指すようにしている。
docker-compose = { version = "latest", postinstall = 'mkdir -p "${DOCKER_CONFIG:-$HOME/.config/docker}/cli-plugins" && ln -sfn "$MISE_TOOL_INSTALL_PATH/docker-cli-plugin-docker-compose" "${DOCKER_CONFIG:-$HOME/.config/docker}/cli-plugins/docker-compose"' }
colima = "latest"
lima = "latest"

# CLI & TUI ツール
aws-cli = { version = "latest", symlink_bins = "true" }
"aqua:peteretelej/tree" = "latest"
bat = "latest"
# delta: git の差分を見やすく表示するページャ(AI が生成した変更のレビュー用)。git/config から呼び出す。
delta = "latest"
fd = "latest"
fzf = "latest"
ripgrep = "latest"
tmux = "latest"
zoxide = "latest"

[settings.go]
set_gobin = false

[settings.pipx]
# pipx バックエンドのツールを pipx ではなく uv(uvx) で導入・実行する（既定 true）
uvx = true

[tasks.up]
description = "Homebrew と mise をまとめて更新"
run = [
  "brew update",
  "brew upgrade --cask --greedy --yes",
  "brew cleanup",
  "mise self-update --yes",
  "mise upgrade",
  "mise prune --yes",
]
