[tools]
# Javascript系
node = "latest"
pnpm = "latest"

# Python系
python = "latest"
uv = "latest"

# git系
"github:cli/cli" = "latest"
"aqua:x-motemen/ghq" = "latest"
"aqua:jesseduffield/lazygit" = "latest"

# shell拡張
"github:rossmacarthur/sheldon" = "latest"
"aqua:junegunn/fzf" = "latest"
"aqua:starship/starship" = "latest"

# Terminal拡張
"github:ogulcancelik/herdr" = "latest"
"github:modem-dev/hunk" = "latest"
"aqua:sxyazi/yazi" = "latest"

# Docker
"aqua:docker/cli" = "latest"
# aqua の compose は docker-cli-plugin-docker-compose という名前で入るため、
# そのままでは docker が CLI プラグインとして認識せず `docker compose` が使えない。
# postinstall で $DOCKER_CONFIG/cli-plugins/ に symlink を張って解決する。
# インストール・更新のたびに再実行されるので、リンク先は常に最新版を指す。
"aqua:docker/compose" = {
  version = "latest",
  postinstall = '''
mkdir -p "${XDG_CONFIG_HOME:-$HOME/.config}/docker/cli-plugins" &&
ln -sfn "$MISE_TOOL_INSTALL_PATH/docker-cli-plugin-docker-compose" \
        "${XDG_CONFIG_HOME:-$HOME/.config}/docker/cli-plugins/docker-compose"
'''
}
# colima はコンテナの実行基盤(VM)。VM の管理には limactl を PATH から呼ぶため
# lima も必須(欠けると colima list が exit status 1 で落ちる)。
"aqua:lima-vm/lima" = "latest"
"aqua:abiosoft/colima" = "latest"
# コンテナ/イメージ/ログを一覧する TUI。Docker Desktop の GUI 部分の代替。
"aqua:jesseduffield/lazydocker" = "latest"

# Other CLI Tools
"aqua:aws/aws-cli" = "latest"
"vfox:jdx/vfox-eza" = "latest"

[settings.pipx]
# pipx バックエンドのツールを pipx ではなく uv(uvx) で導入・実行する
uvx = true

[tasks.up]
description = "Homebrew・mise・zsh プラグイン(sheldon)をまとめて更新"
env = { MISE_GITHUB_TOKEN = "{{ exec(command='gh auth token 2>/dev/null || true') | trim }}" }
run = [
  "brew update",
  "brew upgrade --greedy --yes", # formula と cask の両方を更新(--greedy で自動更新持ちの cask も対象)
  "brew cleanup",
  "mise self-update --yes",
  "mise upgrade",
  "mise prune --yes",
  "sheldon lock --update", # zsh プラグイン(plugins.toml)も最新化
]
