[tools]
"aqua:ajeetdsouza/zoxide" = "latest"
"aqua:BurntSushi/ripgrep" = "latest"
"aqua:gh" = "latest"
"aqua:junegunn/fzf" = "latest"
"aqua:neovim/neovim" = "latest"
"aqua:rossmacarthur/sheldon" = "latest"
"aqua:sharkdp/bat" = "latest"
"aqua:sharkdp/fd" = "latest"
"aqua:tmux/tmux-builds" = "latest"
"aqua:tree-sitter/tree-sitter" = "latest"
node = "latest"
"aqua:LuaLS/lua-language-server" = "latest"
java = "temurin-25"
kotlin = { version = "2.4", asset_pattern = "kotlin-compiler-*.zip", bin_path = "kotlinc/bin" }
"aqua:x-motemen/ghq" = "latest"
python = "latest"
uv = "latest"
"pipx:trafilatura" = "latest"

[tasks.up]
description = "Homebrew と mise をまとめて更新"
run = [
  "brew update",
  "brew upgrade",
  "brew cleanup",
  "mise self-update --yes",
  "mise upgrade",
  "mise prune --yes",
]

[settings]

[settings.pipx]
uvx = true
