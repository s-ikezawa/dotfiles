# tmux設定ファイル
# tmux sensibleをベースとした設定

# UTF-8サポートを有効化
set -g utf8 on
set -g status-utf8 on

# vimモード切り替えの遅延を解決
set -s escape-time 0

# スクロールバックバッファサイズを増加
set -g history-limit 50000

# tmuxメッセージを4秒間表示
set -g display-time 4000

# ステータスバーをより頻繁に更新
set -g status-interval 5

# $TERM環境変数を256色対応に設定
set -g default-terminal "screen-256color"

# 256色とTrue Color（24bit）サポートを強化
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",screen-256color:Tc"

# tmuxコマンドプロンプト（prefix + :）でemacsキーバインドを使用
# vimユーザーでもemacsキーの方が使いやすい
set -g status-keys emacs

# フォーカスイベントを有効化（対応ターミナル用）
set -g focus-events on

# グループセッションやマルチモニター環境で有用
setw -g aggressive-resize on

# 前後のウィンドウ切り替えを簡単に
bind C-p previous-window
bind C-n next-window

# 設定ファイルをリロード
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# プレフィックスキー'C-a'の設定
bind C-a send-prefix
bind a last-window

# ペイン分割をsとvで実行
bind s split-window -v
bind v split-window -h
unbind '"'
unbind %

# vim風のキーバインドでペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# プレフィックスなしでAlt+矢印キーでペイン切り替え
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# マウスサポートを有効化（tmux 2.1以降）
set -g mouse on

# ウィンドウの自動リネームを無効化
set-option -g allow-rename off

# ウィンドウ番号を1から開始（キーボード配列と一致させる）
set -g base-index 1
set-window-option -g pane-base-index 1

# ウィンドウを閉じた後、連番で再採番
set -g renumber-windows on

# 連続実行コマンドの受付時間を延長
set -g repeat-time 1000

# ウィンドウ名変更時は空白から開始
bind-key , command-prompt -p (rename-window) "rename-window '%%'"

# セッション名変更時は空白から開始
bind-key '$' command-prompt -p (rename-session) "rename-session '%%'"

# ペインサイズ変更を簡単に
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2