# pip設定ファイル
# ~/.config/pip/pip.conf

[global]
# キャッシュディレクトリをXDG準拠に設定
cache-dir = ~/.cache/pip

# ログファイルをXDG準拠に設定
log-file = ~/.local/share/pip/pip.log

# ユーザーレベルでのインストールを有効化
user = true

# パッケージのアップグレード時の確認を省略
upgrade-strategy = eager

[install]
# ユーザーレベルでのインストール先を設定
user = true

# 依存関係の解決を改善
use-pep517 = true
